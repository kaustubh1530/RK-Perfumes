<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – RK Perfume</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="rk-login-body">

  <div class="login-wrapper">

    <!-- Logo -->
    <div class="text-center mb-4">
      <h2 class="rk-brand"><span class="brand-rk">RK</span> Perfume</h2>
      <p class="text-muted small letter-wide">ADMIN PORTAL</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login Card -->
    <div class="login-card">
      <h5 class="mb-1">Sign In</h5>
      <p class="text-muted small mb-4">Enter your credentials to access the dashboard</p>

      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <div class="mb-3">
          <label class="form-label rk-label" for="email">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control rk-input"
                   placeholder="admin@rkperfume.com" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label rk-label" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password"
                   class="form-control rk-input" placeholder="••••••••" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePwd">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn rk-btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>

      </form>
    </div>

    <p class="text-center text-muted small mt-3">
      <a href="{{ url_for('products.home') }}" class="text-muted">
        <i class="bi bi-arrow-left me-1"></i>Back to website
      </a>
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
